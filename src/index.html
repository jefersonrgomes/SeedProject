<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Semente</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #444;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #info {
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 0.1em;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="info">dia 0 — germinação iniciada — primeiro adubo absorvido</div>

  <script>
    const SCALE = 6;
    const W = 48;
    const H = 48;

    const canvas = document.getElementById('c');
    canvas.width  = W * SCALE;
    canvas.height = H * SCALE;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // Paleta
    const P = {
      void:     '#0a0a0a',
      soil1:    '#3b2312',
      soil2:    '#4e2f17',
      soil3:    '#2a1a0e',
      seed:     '#c8a85a',
      seedDark: '#8b6914',
      root:     '#7a5c2e',
      rootTip:  '#a07840',
      glow:     '#d4b96a',
    };

    // Estado da cena
    let tick = 0;

    // Desenha pixel escalado
    function px(x, y, color, alpha) {
      if (alpha !== undefined) ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
      if (alpha !== undefined) ctx.globalAlpha = 1;
    }

    // Solo
    function drawSoil() {
      for (let y = 28; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const noise = (x * 3 + y * 7) % 5;
          if (noise < 2)      px(x, y, P.soil1);
          else if (noise < 4) px(x, y, P.soil2);
          else                px(x, y, P.soil3);
        }
      }
    }

    // Fundo
    function drawVoid() {
      ctx.fillStyle = P.void;
      ctx.fillRect(0, 0, canvas.width, 28 * SCALE);
    }

    // Semente com pulso e brilho leve (adubo absorvido)
    function drawSeed(pulse) {
      const cx = Math.floor(W / 2);
      const cy = 30;

      // Brilho externo (semente ativada pelo adubo)
      if (pulse) {
        px(cx - 2, cy,     P.glow, 0.15);
        px(cx + 2, cy,     P.glow, 0.15);
        px(cx,     cy - 1, P.glow, 0.15);
        px(cx,     cy + 1, P.glow, 0.15);
      }

      // Corpo da semente — 3×2 pixels
      const color = pulse ? P.seed : P.seedDark;
      px(cx - 1, cy,     color);
      px(cx,     cy,     color);
      px(cx + 1, cy,     color);
      px(cx - 1, cy + 1, P.seedDark);
      px(cx,     cy + 1, color);
      px(cx + 1, cy + 1, P.seedDark);
    }

    // Raiz primária (começa a crescer após primeiro adubo)
    function drawRoot(rootPhase) {
      const cx = Math.floor(W / 2);

      // Raiz principal desce 2 pixels
      px(cx, 32, P.root);
      if (rootPhase >= 1) {
        px(cx, 33, P.rootTip);
      }
    }

    function render() {
      tick++;

      const pulse = Math.floor(tick / 45) % 2 === 0;
      // Raiz cresce gradualmente após 120 frames
      const rootPhase = tick > 120 ? 1 : 0;

      drawVoid();
      drawSoil();
      drawRoot(rootPhase);
      drawSeed(pulse);

      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
